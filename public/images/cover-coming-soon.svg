  <rect width="400" height="600" fill="url(#bg)"/>
  <rect width="400" height="600" fill="url(#glow)"/>
  <rect x="14" y="14" width="372" height="572" fill="none" stroke="#C9A24B" stroke-opacity="0.35" stroke-width="1.5" rx="6"/>

