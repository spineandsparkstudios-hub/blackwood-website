  <circle cx="200" cy="350" r="3" fill="#C9A24B"/>

  <text x="200" y="408" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" letter-spacing="2" fill="#F5EFE6">COMING</text>
  <text x="200" y="446" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" letter-spacing="2" fill="#F5EFE6">SOON</text>

